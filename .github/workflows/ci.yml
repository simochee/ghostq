name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_call:
    inputs:
      from_release:
        description: Set when invoked from the release workflow, so this run keeps its own concurrency group and never cancels standalone CI runs.
        type: boolean
        default: false

# Standalone CI runs cancel the previous run on the same ref. Runs invoked from
# release get a distinct group (keyed on from_release), so a release never
# cancels an in-progress standalone CI run and vice versa.
concurrency:
  group: ci-${{ inputs.from_release && 'release' || 'standalone' }}-${{ github.ref }}
  cancel-in-progress: ${{ !inputs.from_release }}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3"
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun test
      - run: bun run build
